[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Tag               app.login
    Path              /logs/app.log
    Parser            app_json
    DB                /fluent-bit/tail-db/app.db
    Read_from_Head    On
    Refresh_Interval  2
    Skip_Long_Lines   On
    Mem_Buf_Limit     5MB

[OUTPUT]
    Name                es
    Match               app.login
    Host                elasticsearch
    Port                9200
    Index               siem-app-logs
    Logstash_Format     Off
    Suppress_Type_Name  On
    Time_Key            @timestamp
    Retry_Limit         False
